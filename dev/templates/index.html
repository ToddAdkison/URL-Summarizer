<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Summarizer - Ollama</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(94, 53, 177, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(33, 150, 243, 0.1) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite;
        }
        
        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, -50px); }
        }
        
        .container {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 1px rgba(255, 255, 255, 0.1) inset;
            padding: 50px;
            max-width: 800px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.3));
        }
        
        h1 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .input-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.3px;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 16px;
            color: #ffffff;
            transition: all 0.3s ease;
            outline: none;
        }
        
        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        input[type="text"]:focus, select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%23ffffff' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 20px center;
            padding-right: 50px;
        }
        
        select option {
            background: #1a1a2e;
            color: #ffffff;
        }
        
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        button:disabled::before {
            display: none;
        }
        
        .result-container {
            margin-top: 30px;
            padding: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            border-left: 4px solid #667eea;
            display: none;
        }
        
        .result-container.show {
            display: block;
            animation: slideIn 0.4s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-url {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 16px;
            word-break: break-all;
            font-size: 14px;
            letter-spacing: 0.3px;
        }
        
        .result-summary {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 15px;
        }
        
        .error {
            background: rgba(220, 38, 38, 0.1);
            border-left-color: #dc2626;
        }
        
        .error .result-url {
            color: #f87171;
        }
        
        .error .result-summary {
            color: rgba(248, 113, 113, 0.9);
        }
        
        .loading {
            text-align: center;
            margin-top: 30px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .loading p {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
            font-size: 14px;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .icon {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🤖</div>
            <h1>Website Summarizer</h1>
            <p class="subtitle">Powered by Ollama AI</p>
        </div>
        
        <form id="summarizerForm">
            <div class="input-group">
                <label for="url">Website URL</label>
                <input 
                    type="text" 
                    id="url" 
                    name="url" 
                    placeholder="https://example.com"
                    required
                >
            </div>
            
            <div class="input-group">
                <label for="model">Ollama Model</label>
                <select id="model" name="model">
                    <option value="llama2">llama2</option>
                </select>
            </div>
            
            <button type="submit" id="submitBtn">Summarize Website</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching and summarizing content...</p>
        </div>
        
        <div class="result-container" id="result">
            <div class="result-url" id="resultUrl"></div>
            <div class="result-summary" id="resultSummary"></div>
        </div>
    </div>
    
    <script>
        // Load available models on page load
        async function loadModels() {
            try {
                const response = await fetch('/models');
                const data = await response.json();
                
                if (data.models && data.models.length > 0) {
                    const modelSelect = document.getElementById('model');
                    modelSelect.innerHTML = '';
                    
                    data.models.forEach(model => {
                        const option = document.createElement('option');
                        option.value = model;
                        option.textContent = model;
                        modelSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Failed to load models:', error);
            }
        }
        
        // Handle form submission with streaming
        document.getElementById('summarizerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('url').value;
            const model = document.getElementById('model').value;
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const resultSummary = document.getElementById('resultSummary');
            
            // Reset UI
            result.classList.remove('show', 'error');
            loading.classList.add('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            resultSummary.textContent = '';
            
            try {
                // Use streaming endpoint
                const response = await fetch('/summarize-stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url, model })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to start summarization');
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let summary = '';
                
                // Hide loading, show result container
                loading.classList.remove('show');
                result.classList.add('show');
                document.getElementById('resultUrl').textContent = `Summary for: ${url}`;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            
                            if (data.error) {
                                result.classList.add('error');
                                document.getElementById('resultUrl').textContent = 'Error';
                                resultSummary.textContent = data.error;
                                break;
                            }
                            
                            if (data.chunk) {
                                summary += data.chunk;
                                resultSummary.textContent = summary;
                            }
                            
                            if (data.done) {
                                break;
                            }
                        }
                    }
                }
                
            } catch (error) {
                loading.classList.remove('show');
                result.classList.add('show', 'error');
                document.getElementById('resultUrl').textContent = 'Error';
                document.getElementById('resultSummary').textContent = `Failed to summarize: ${error.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Summarize Website';
            }
        });
        
        // Load models when page loads
        loadModels();
    </script>
</body>
</html>
